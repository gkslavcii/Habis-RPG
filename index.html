<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Habis RPG">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#231F20">
    <meta name="screen-orientation" content="portrait">
    <meta name="format-detection" content="telephone=no">
    <title>Habis RPG</title>
    <link rel="shortcut icon" href="TemplateData/webmemd-icon.png">
    <link rel="apple-touch-icon" href="TemplateData/webmemd-icon.png">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <div class="splash-title">HABIS RPG</div>
      <div class="splash-subtitle">Oyun yukleniyor...</div>
      <div class="splash-loader">
        <div class="splash-loader-bar" id="splash-progress"></div>
      </div>
    </div>

    <!-- PWA Install Banner -->
    <div id="pwa-install-banner" onclick="installPWA()">Ana Ekrana Ekle</div>

    <!-- Unity Container -->
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      // ── PWA Install ──
      let deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('pwa-install-banner').style.display = 'block';
      });

      function installPWA() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          document.getElementById('pwa-install-banner').style.display = 'none';
          deferredPrompt = null;
        });
      }

      // ── Service Worker Registration ──
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('ServiceWorker.js');
      }

      // ── Mobile Fullscreen & Orientation ──
      function requestFullscreen() {
        var el = document.documentElement;
        var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
        if (rfs) {
          rfs.call(el).catch(function() {});
        }
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('portrait').catch(function() {});
        }
      }

      // Fullscreen on first touch (mobile browsers require user gesture)
      document.addEventListener('touchstart', function onFirstTouch() {
        requestFullscreen();
        document.removeEventListener('touchstart', onFirstTouch);
      }, { once: true });

      // ── Prevent unwanted mobile behaviors ──
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
      document.addEventListener('dblclick', function(e) { e.preventDefault(); });

      // Prevent pull-to-refresh on mobile
      document.body.addEventListener('touchmove', function(e) {
        if (e.target === document.body || e.target === document.documentElement) {
          e.preventDefault();
        }
      }, { passive: false });

      // ── Keep screen awake (Wake Lock API) ──
      var wakeLock = null;
      async function requestWakeLock() {
        if ('wakeLock' in navigator) {
          try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
        }
      }
      requestWakeLock();
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') requestWakeLock();
      });

      // ── Unity Setup ──
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var splashProgress = document.querySelector("#splash-progress");
      var splashScreen = document.querySelector("#splash-screen");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px; color: #000;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebBuild.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebBuild.data",
        frameworkUrl: buildUrl + "/WebBuild.framework.js",
        codeUrl: buildUrl + "/WebBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Habis RPG",
        productName: "Habis-RPG",
        productVersion: "0.2.0",
        showBanner: unityShowBanner,
        // devicePixelRatio: 1, // Uncomment to force 1x resolution on high-DPI screens
      };

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          progressBarFull.style.width = 100 * progress + "%";
          if (splashProgress) splashProgress.style.width = 100 * progress + "%";
        }).then(function(unityInstance) {
          loadingBar.style.display = "none";
          // Fade out splash screen
          if (splashScreen) {
            splashScreen.style.opacity = '0';
            setTimeout(function() { splashScreen.style.display = 'none'; }, 500);
          }
          // Expose for JS interop
          window.unityInstance = unityInstance;
        }).catch(function(message) {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
